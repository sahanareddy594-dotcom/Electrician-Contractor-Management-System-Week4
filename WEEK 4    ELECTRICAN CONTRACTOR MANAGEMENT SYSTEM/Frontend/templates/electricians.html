<!DOCTYPE html>
<html>
<head>
    <title>Electricians</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="sidebar">
    <h2>ECMS</h2>
    <a href="/">Dashboard</a>
    <a href="/electricians">Electricians</a>
    <a href="/jobs">Jobs</a>
    <a href="/tasks">Tasks</a>
    <a href="/materials">Materials</a>
</div>

<div class="main">
    <h2>Electricians</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="text" name="experience" placeholder="Experience" required>
        <button>Add</button>
    </form><h2>Electricians</h2>

<table>
<tr>
    <th>Profile</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Experience</th>
</tr>

{% for e in data %}
<tr>
    <td>
        <img class="profile-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    </td>
    <td>{{ e.name }}</td>
    <td>{{ e.phone }}</td>
    <td>{{ e.experience }}</td>
</tr>
{% endfor %}
</table>

    
</div>

</body>
</html>
